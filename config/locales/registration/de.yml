        title: "Anmeldeverfahren: Wann verwenden?"
        intro: "Ein Anmeldeverfahren orchestriert die Einschreibung in Gruppen über einen festgelegten Zeitraum. Für einfache Fälle kannst Du Anmeldeverfahren überspringen und Selbstanmeldung aktivieren."
        when_to_use_campaign:
          title: "Verwende ein Anmeldeverfahren, wenn..."
          benefits:
            - "Du Registrierungen vor der Finalisierung prüfen möchtest"
            - "Zulassungsregeln notwendig sind (z.B. Leistungsnachweis, institutionelle E-Mail)"
            - "Studierende Präferenzen abgeben sollen (bevorzugte Tutorien/Vorträge)"
            - "Du eine zeitlich begrenzte Anmeldephase benötigst"
        when_to_use_self:
          title: "Verwende Selbstanmeldung, wenn..."
          benefits:
            - "Keine Zulassungsprüfungen erforderlich sind"
            - "First-Come-First-Served ausreicht (keine Präferenzen)"
            - "Studierende jederzeit beitreten/verlassen können sollen"
            - "Die Verwaltung möglichst einfach sein soll"
        note: "Selbstanmeldung kann nach Abschluss eines Anmeldeverfahrens aktiviert werden, um Nachzügler oder Gruppenwechsel zu ermöglichen."
    policy:
      helpdesk:
        policies: "Richtlinien sind Regeln, die einschränken, wer sich anmelden darf (z.B. nur Nutzende mit bestimmten E-Mail-Domains oder Studierende, die bestimmte Leistungen erbracht haben)."
