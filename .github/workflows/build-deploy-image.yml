name: Build Deploy Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag override
        required: false
        type: string
      image_repository:
        description: Optional GHCR repository override
        required: false
        type: string
  push:
    branches:
      - deploy/app-baseline-thruster

jobs:
  build-deploy-image:
    name: Build deploy image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      IMAGE_REPOSITORY: ${{ inputs.image_repository || 'ghcr.io/mampf-hd/mampf-deploy' }}
      IMAGE_TAG: ${{ inputs.image_tag || github.sha }}
      COSIGN_VERSION: v2.2.4
    outputs:
      image: ${{ steps.image.outputs.image }}
      image_tag: ${{ steps.image.outputs.image_tag }}
      image_repository: ${{ steps.image.outputs.image_repository }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image reference
        id: image
        run: |
          echo "image=${IMAGE_REPOSITORY}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_repository=${IMAGE_REPOSITORY}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build and push deploy image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./docker/production/Dockerfile
          push: true
          tags: ${{ steps.image.outputs.image }}
          cache-from: type=registry,ref=${{ env.IMAGE_REPOSITORY }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_REPOSITORY }}:buildcache,mode=max

      # NOTE: this Trivy scan is intentionally advisory (non-gating). exit-code
      # "0" means findings never fail the build; the image is already pushed and
      # cosign-signed above, and the next step only writes a summary. This is a
      # deliberate decision (visibility over enforcement), not an oversight. To
      # turn it into a gate later, scan the locally-built image before push with
      # exit-code "1" and severity CRITICAL,HIGH.
      - name: Scan published runtime image
        id: trivy_scan
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8 # v0.33.1
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        with:
          version: v0.71.2
          image-ref: ${{ steps.image.outputs.image_repository }}@${{ steps.build.outputs.digest }}
          format: json
          output: trivy-results.json
          exit-code: "0"
          ignore-unfixed: true
          severity: CRITICAL
          vuln-type: os,library
          hide-progress: true

      - name: Summarize Trivy findings
        if: always()
        env:
          IMAGE_DIGEST_REFERENCE: ${{ steps.image.outputs.image_repository }}@${{ steps.build.outputs.digest }}
          TRIVY_RESULTS_PATH: trivy-results.json
        run: |
          python3 .github/actions/summarize_trivy.py

      - name: Install cosign
        run: |
          curl -fsSLo /tmp/cosign-linux-amd64 "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64"
          curl -fsSLo /tmp/cosign_checksums.txt "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign_checksums.txt"
          (cd /tmp && grep ' cosign-linux-amd64$' cosign_checksums.txt | sha256sum --check --status)
          install -m 0755 /tmp/cosign-linux-amd64 /usr/local/bin/cosign
          cosign version

      - name: Sign the published Docker image
        run: cosign sign --yes "${{ steps.image.outputs.image_repository }}@${{ steps.build.outputs.digest }}"

      - name: Write deploy image metadata
        run: |
          cat > deploy-image-metadata.json <<EOF
          {
            "image_repository": "${{ steps.image.outputs.image_repository }}",
            "tag": "${{ steps.image.outputs.image_tag }}",
            "image": "${{ steps.image.outputs.image }}",
            "digest": "${{ steps.build.outputs.digest }}",
            "digest_image": "${{ steps.image.outputs.image_repository }}@${{ steps.build.outputs.digest }}",
            "source_ref": "${{ github.ref_name }}",
            "head_sha": "${{ github.sha }}",
            "event_name": "${{ github.event_name }}",
            "run_id": "${{ github.run_id }}"
          }
          EOF

      - name: Upload deploy image metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: deploy-image-metadata
          path: deploy-image-metadata.json

      - name: Print image reference
        run: |
          echo "Built image: ${{ steps.image.outputs.image }}"
          {
            echo "## Image"
            echo
            echo "Image: \`${{ steps.image.outputs.image }}\`"
            echo
            echo "Tag: \`${{ steps.image.outputs.image_tag }}\`"
            echo
            echo "Digest: \`${{ steps.image.outputs.image_repository }}@${{ steps.build.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
