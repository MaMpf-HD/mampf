name: Build Deploy Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag override
        required: false
        type: string
      image_repository:
        description: Optional GHCR repository override
        required: false
        type: string
  push:
    branches:
      - deploy/app-baseline-thruster

jobs:
  build-deploy-image:
    name: Build deploy image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      IMAGE_REPOSITORY: ${{ inputs.image_repository || 'ghcr.io/mampf-hd/mampf-deploy' }}
      IMAGE_TAG: ${{ inputs.image_tag || github.sha }}
    outputs:
      image: ${{ steps.image.outputs.image }}
      image_tag: ${{ steps.image.outputs.image_tag }}
      image_repository: ${{ steps.image.outputs.image_repository }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image reference
        id: image
        run: |
          echo "image=${IMAGE_REPOSITORY}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_repository=${IMAGE_REPOSITORY}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and push deploy image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./docker/production/Dockerfile
          push: true
          tags: ${{ steps.image.outputs.image }}
          cache-from: type=registry,ref=${{ env.IMAGE_REPOSITORY }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_REPOSITORY }}:buildcache,mode=max

      - name: Scan published runtime image
        id: trivy_scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8 # v0.33.1
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        with:
          version: v0.71.2
          image-ref: ${{ steps.image.outputs.image_repository }}@${{ steps.build.outputs.digest }}
          format: json
          output: trivy-results.json
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL
          vuln-type: os,library
          hide-progress: true

      - name: Summarize Trivy findings
        if: always()
        env:
          IMAGE_DIGEST_REFERENCE: ${{ steps.image.outputs.image_repository }}@${{ steps.build.outputs.digest }}
        run: |
          python3 <<'PY'
          import json
          import os
          import sys
          from collections import Counter

          path = "trivy-results.json"
          if not os.path.exists(path):
            print("Trivy did not produce trivy-results.json", file=sys.stderr)
            sys.exit(1)

          with open(path, encoding="utf-8") as handle:
            data = json.load(handle)

          results = data.get("Results") or []

          def severity_counts(vulns):
            counts = Counter()
            for vuln in vulns:
              counts[vuln.get("Severity", "UNKNOWN")] += 1
            return counts

          os_results = []
          dependency_results = []
          for result in results:
            if result.get("Class") == "os-pkgs":
              os_results.append(result)
            else:
              dependency_results.append(result)

          os_vulns = [
            vuln
            for result in os_results
            for vuln in (result.get("Vulnerabilities") or [])
          ]
          vulnerable_dependency_results = [
            result for result in dependency_results if result.get("Vulnerabilities")
          ]

          lines = []
          lines.append("## Trivy Scan")
          lines.append("")
          lines.append("Scanned image references:")
          lines.append(
            f"- MaMpf deploy image: `{os.environ['IMAGE_DIGEST_REFERENCE']}`"
          )
          lines.append("")
          lines.append("Not scanned by this workflow:")
          lines.append("- Separate service images such as Redis and Memcached")
          lines.append("")

          os_target = "runtime image"
          os_type = "os"
          if os_results:
            os_target = os_results[0].get("Target") or os_target
            os_type = os_results[0].get("Type") or os_type

          os_counts = severity_counts(os_vulns)
          lines.append("Scanned surfaces inside the MaMpf deploy image:")
          lines.append(
            f"- Base image / OS packages (`{os_type}`): {len(os_vulns)} matching vulnerabilities"
          )
          if os_vulns:
            lines.append(
              "  Severities: " + ", ".join(
                f"{severity} {os_counts[severity]}"
                for severity in ("CRITICAL", "HIGH", "MEDIUM", "LOW", "UNKNOWN")
                if os_counts[severity]
              )
            )
            lines.append(f"  Target: `{os_target}`")

          if vulnerable_dependency_results:
            lines.append("- Application dependencies found in the image:")
            for result in vulnerable_dependency_results:
              vulns = result.get("Vulnerabilities") or []
              counts = severity_counts(vulns)
              target = result.get("Target") or "unknown target"
              target_type = result.get("Type") or "unknown"
              lines.append(
                "  - "
                f"`{target}` ({target_type}): {len(vulns)} vulnerabilities"
                + " ["
                + ", ".join(
                  f"{severity} {counts[severity]}"
                  for severity in ("CRITICAL", "HIGH", "MEDIUM", "LOW", "UNKNOWN")
                  if counts[severity]
                )
                + "]"
              )
              for vuln in vulns:
                fixed = vuln.get("FixedVersion") or "no fix listed"
                pkg = vuln.get("PkgName") or "unknown package"
                installed = vuln.get("InstalledVersion") or "unknown version"
                vid = vuln.get("VulnerabilityID") or "unknown id"
                lines.append(
                  f"    - `{vid}` in `{pkg}` {installed} -> {fixed}"
                )
          else:
            lines.append("- Application dependencies found in the image: none")

          output = "\n".join(lines)
          print(output)
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as handle:
            handle.write(output + "\n")
          PY

      - name: Fail on blocked Trivy findings
        if: steps.trivy_scan.outcome == 'failure'
        run: |
          echo "Trivy detected policy-blocking vulnerabilities. See the Trivy Scan summary above."
          exit 1

      - name: Install cosign
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 # v3.5.0

      - name: Sign the published Docker image
        run: cosign sign --yes "${{ steps.image.outputs.image_repository }}@${{ steps.build.outputs.digest }}"

      - name: Write deploy image metadata
        run: |
          cat > deploy-image-metadata.json <<EOF
          {
            "image_repository": "${{ steps.image.outputs.image_repository }}",
            "tag": "${{ steps.image.outputs.image_tag }}",
            "image": "${{ steps.image.outputs.image }}",
            "digest": "${{ steps.build.outputs.digest }}",
            "digest_image": "${{ steps.image.outputs.image_repository }}@${{ steps.build.outputs.digest }}",
            "source_ref": "${{ github.ref_name }}",
            "head_sha": "${{ github.sha }}",
            "event_name": "${{ github.event_name }}",
            "run_id": "${{ github.run_id }}"
          }
          EOF

      - name: Upload deploy image metadata
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: deploy-image-metadata
          path: deploy-image-metadata.json

      - name: Print image reference
        run: |
          echo "Built image: ${{ steps.image.outputs.image }}"
          {
            echo "## Image"
            echo
            echo "Image: \`${{ steps.image.outputs.image }}\`"
            echo
            echo "Tag: \`${{ steps.image.outputs.image_tag }}\`"
            echo
            echo "Digest: \`${{ steps.image.outputs.image_repository }}@${{ steps.build.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
