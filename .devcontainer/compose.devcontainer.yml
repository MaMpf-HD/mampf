include:
  - path: 
      # relative to docker/development/
      - ../../docker/cypress/compose.yml
      - ../../docker/cypress/compose.interactive.yml

services:
  app:
    command: "sleep infinity"
    environment:
      # Relocate Claude Code's data dir into the persisted volume below so
      # sessions, todos and login survive a devcontainer rebuild.
      CLAUDE_CONFIG_DIR: /workspaces/claude
    volumes:
      # Persist bash history
      # https://code.visualstudio.com/remote/advancedcontainers/persist-bash-history
      - mampf-command-history:/workspaces/commandhistory/
      # Persist Claude Code data (see CLAUDE_CONFIG_DIR above)
      - claude-code:/workspaces/claude

  app-test:
    command: "RUBY_DEBUG_ENABLE=0 /workspaces/mampf/docker/development/init-and-run.sh | tee /proc/1/fd/1"

  xpra:
    build:
      context: ../../
      dockerfile: docker/xpra/Dockerfile
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
    ports:
      - 8060:8060

volumes:
  mampf-command-history:
  claude-code:
