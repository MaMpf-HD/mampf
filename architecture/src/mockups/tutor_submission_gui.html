<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exam Roster - Final Exam (Tutor View)</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  
  <style>
    .task-col {
      width: 90px;
      min-width: 80px;
    }

    .task-input-compact {
      width: 70px;
      margin: 0 auto;
      text-align: center;
    }
  </style>
    
  </head>

<body>
<div class="container-fluid py-4 bg-light">

  <div class="row justify-content-between">
    <!-- Assignment Selector -->
    <div class="col-md-4 m-3">
      <h5 class="form-label fw-semibold mb-1">Assignment</h5>
      <select class="form-select form-select-sm" id="assignmentSelect">
        <option value="1">Assignment 1</option>
        <option value="2">Assignment 2</option>
        <option value="3">Assignment 3</option>
      </select>
    </div>

    <!-- Tutor Info -->
    <div class="col-md-4 m-3">
      <h5 class="form-label fw-semibold mb-1">Your Tutorial Groups</h5>
      <div>
        <span class="badge text-bg-secondary me-1">T01</span>
        <span class="badge text-bg-secondary me-1">T03</span>
        <span class="badge text-bg-secondary">T07</span>
      </div>
    </div>
  </div>



  <div class="card">
    <div class="card-body">
      <div class="card border-0 mb-3">
        <div class="card-body py-2">
          <div class="row align-items-end justify-content-between">
            <!-- Summary Info -->
            <div class="col-md-4 m-3">
              <h5 class="form-label fw-semibold mb-1">Overview</h5>
              <div class="small text-muted">
                24 Submissions • 18 Graded • 6 Pending
              </div>
            </div>
            <div class="d-flex flex-wrap gap-2 justify-content-end m-3 w-auto">
              <button class="btn btn-primary btn-sm">
                <i class="bi bi-download me-1"></i>
                Download All Submissions
              </button>

              <button class="btn btn-success btn-sm">
                <i class="bi bi-save me-1"></i>
                Save All Changes
              </button>

              <button class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-clockwise me-1"></i>
                Reload Data
              </button>

              <button class="btn btn-dark btn-sm">
                <i class="bi bi-file-earmark-arrow-down me-1"></i>
                Export Grades
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="d-flex">

        <!-- LEFT SIDE: TABLE -->
        <div class="flex-grow-1 p-3">
          <div class="card shadow-sm border-0">
            <div class="card-body p-0">

              <div class="table-responsive">
                <table class="table table-sm table-hover align-middle mb-0">

                  <thead class="table-light">
                    <tr>
                      <th>Submission group</th>
                      <th>Tutorial Group</th>
                      <th>Participations</th>
                      <th>Status</th>
                      <th class="text-center task-col">Task 1<br><small class="text-muted">(10 pts)</small></th>
                      <th class="text-center task-col">Task 2<br><small class="text-muted">(15 pts)</small></th>
                      <th class="text-center task-col">Task 3<br><small class="text-muted">(20 pts)</small></th>
                      <th class="text-center task-col">Task 4<br><small class="text-muted">(15 pts)</small></th>
                      <th class="text-center">Total points<br><small class="text-muted">(60 pts)</small></th>
                      <th class="text-center">Grade</th>
                      <th class="text-center">Actions</th>
                    </tr>
                  </thead>

                  <tbody id="submissionTableBody">
                    <!-- Students will be populated by JavaScript -->
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>

        <!-- RIGHT SIDE PANEL -->
        <div id="gradingPanel">
          <!-- This will be populated when a row is clicked -->
        </div>
    </div>
  </div>
</div>

<script>

  editedData = []

  originalData = [
    { id: 12,
      submission_group: "Alice Anderson",
      participants: ["Alice Anderson", "Bob Brown"],
      tutorial: "Tutorial A (Mon 10:00)",
      status: "Graded",
      tasks: [
        { name: "Task 1", points: 9.5, comment: "Good work, but check your calculations." },
        { name: "Task 2", points: 14.0, comment: "Well done!" },
        { name: "Task 3", points: 18.5, comment: "Excellent solution, but you lost some points for not explaining your reasoning." },
        { name: "Task 4", points: 13.0, comment: "Correct answer, but you should have shown more steps." }
      ]
    },
    { id: 13,
      submission_group: "Charlie Clark",
      participants: ["Charlie Clark"],
      tutorial: "Tutorial A (Mon 10:00)",
      status: "Submitted",
      tasks: [
        { name: "Task 1", points: null, comment: null },
        { name: "Task 2", points: null, comment: null },
        { name: "Task 3", points: null, comment: null },
        { name: "Task 4", points: null, comment: null }
      ]
    },
    { id: 14,
      submission_group: "Dana Davis",
      participants: ["Dana Davis", "Eve Evans"],
      tutorial: "Tutorial B (Wed 14:00)",
      status: "Not Submitted",
      tasks: [
        { name: "Task 1", points: null, comment: null },
        { name: "Task 2", points: null, comment: null },
        { name: "Task 3", points: null, comment: null },
        { name: "Task 4", points: null, comment: null }
      ]
    }
  ]
  
  renderTable();

  function renderTable() {
    const tbody = document.getElementById("submissionTableBody");
    tbody.innerHTML = "";
    originalData.forEach(submission => {
      const row = document.createElement("tr");
      row.dataset.id = submission.id;
      row.classList.add("row-clean");

      let tasksHtml = "";
      submission.tasks.forEach((t, index) => {
        tasksHtml += `
          <td class="text-center">
            <input type="number" class="form-control form-control-sm grade-input task-input-compact" data-original="${t.points || ''}" value="${t.points || ''}">
          </td>`;
      });

      row.innerHTML = `
        <td>${submission.submission_group}</td>
        <td>${submission.tutorial}</td>
        <td>
          <ul class="mb-0">
            ${submission.participants.map(p => `<li>${p}</li>`).join("")}
          </ul>
        </td>
        <td class="submission-status">
          <span class="badge rounded-pill text-bg-${greenBadgeClass(submission.status)}">
            ${submission.status}
          </span>
        </td>
        ${tasksHtml}
        <td class="text-center font-monospace"><strong class="total">${sum_scores(submission.tasks)}</strong></td>
        <td class="text-center grade-status">
          <span class="badge text-bg-${greenBadgeClass(submission.status)}">${submission.status === "Graded" ? get_points(submission.tasks, submission.status) : "N/A"}</span>
        </td>
        <td class="text-center">
          <i class="bi bi-download text-primary me-2 action-icon"
              title="Download submission"
              onclick="event.stopPropagation(); downloadSubmissionRow(${submission.id})"></i>
          <i class="bi bi-pencil-square text-secondary me-2 action-icon"
              title="Edit in panel"
              onclick="event.stopPropagation(); openPanel(${submission.id})"></i>
          <i class="bi bi-floppy text-success me-2 action-icon save-icon"
              title="Save changes"
              onclick="event.stopPropagation(); saveCurrentFromTable(${submission.id})"></i>
          <i class="bi bi-arrow-counterclockwise text-danger action-icon reset-icon"
              title="Reset changes"
              onclick="event.stopPropagation(); resetCurrentFromTable(${submission.id})"></i>
        </td>
      `;
      tbody.appendChild(row);
    });
  }

  function sum_scores(tasks) {
    let sum = 0;
    tasks.forEach(t => {
      sum += parseFloat(t.points) || 0;
    });
    return sum.toFixed(1);
  }

  function get_points(tasks, status) {
    score = sum_scores(tasks);
    if (status == "Graded") {
      percent = (score / 60) * 100;
      if (percent >= 90) return "1.0";
      if (percent >= 80) return "1.3";
      if (percent >= 70) return "1.7";
      if (percent >= 60) return "2.0";
      if (percent >= 50) return "2.3";
      if (percent >= 40) return "2.7";
      if (percent >= 30) return "3.0";
      if (percent >= 20) return "3.3";
      if (percent >= 10) return "3.7";
      return "5.0";
    } else {
      return "N/A";
    }
    
  }

  function downloadSubmissionRow(id) {
    alert(`Downloading submission for ID ${id}...`);
  }

  function saveRow(id, needToClosePanel = false) {
    updateOriginalData(id);
    renderRow(id);
    removeTouchedFlag(id);
    if (needToClosePanel) {
      closePanel();
    }
  }

  function resetRow(id, needToClosePanel = false) {
    const row = document.querySelector(`tr[data-id="${id}"]`);
    const submissionData = originalData.find(s => s.id == id);
    if (submissionData) {
      renderRow(id);
      removeTouchedFlag(id);
      if (needToClosePanel) {
        closePanel();
      }
    }
  }

  function removeTouchedFlag(id) {
    editedData = editedData.filter(s => s.id !== id);
  }

  function updateOriginalData(id) {
    const dataNew = editedData.find(s => s.id == id)?.tasks;
    const submissionData = originalData.find(s => s.id == id);
    if (submissionData) {
      let allGradded = true;
      submissionData.tasks.forEach((task, index) => {
        let newPoints = parseFloat(dataNew[index].score);
        task.points = newPoints;
        if (isNaN(newPoints) || newPoints < 0) {
          allGradded = false;
        }
        if (dataNew[index].commentTouched) {
          task.comment = dataNew[index].comment;
          task.commentTouched = false;
        }
      });
      if (allGradded) {
        submissionData.status = "Graded";
      } else if (submissionData.status === "Graded") {
        submissionData.status = "Submitted";
      }
    }
  }

  function greenBadgeClass(status) {
    return status === "Submitted" || status === "Graded" ? "success" : "secondary";
  }

  function renderRow(id) {
    const row = document.querySelector(`tr[data-id="${id}"]`);
    const submissionData = originalData.find(s => s.id == id);
    console.log(submissionData);
    if (submissionData) {
      row.querySelectorAll(".grade-input").forEach((input, index) => {
        input.value = submissionData.tasks[index].points || "";
      });
      row.querySelector(".total").textContent = sum_scores(submissionData.tasks);
      row.querySelector(".submission-status .badge").textContent = submissionData.status;
      let badge = row.querySelector(".submission-status .badge");
      badge.classList.remove("text-bg-secondary", "text-bg-success", "text-bg-danger", "text-bg-warning");
      badge.classList.add(`text-bg-${greenBadgeClass(submissionData.status)}`);
      row.querySelector(".grade-status .badge").textContent = get_points(submissionData.tasks, submissionData.status);
      badge = row.querySelector(".grade-status .badge");
      badge.classList.remove("text-bg-secondary", "text-bg-success", "text-bg-danger", "text-bg-warning");
      badge.classList.add(`text-bg-${greenBadgeClass(submissionData.status)}`);
    }
  }

  function initPanel() {
    return `
      <div class="p-3 h-100 d-flex flex-column">
        <div class="row mb-3">
          <div class="col">
            <h5 class="mb-0">Submission #<span id="panelId"></span></h5>
          </div>
          <div class="col text-end">
            <button class="btn btn-sm btn-outline-secondary"
                    onclick="closePanel()">
              Close
            </button>
          </div>
        </div>

        <div id="panelTasks" class="flex-grow-1 overflow-auto"></div>

        <div class="pt-3 border-top d-flex justify-content-between">
          <button class="btn btn-primary btn-sm"
                  onclick="saveCurrentFromPanel()">
            Save
          </button>

          <button class="btn btn-outline-secondary btn-sm"
                  onclick="resetCurrentFromPanel()">
            Reset
          </button>
        </div>

      </div>
    `;
}

  // Right-side panel logic
  function openPanel(id) {
    const panel = document.getElementById("gradingPanel");
    panel.innerHTML = initPanel();
    panel.classList.add("active");
    document.getElementById("panelId").textContent = id;

    const row = document.querySelector(`tr[data-id="${id}"]`);
    const tasksNow = row.querySelectorAll(".grade-input");
    const tasksOriginal = originalData.find(s => s.id == id).tasks;

    let html = "";
    tasksNow.forEach((t, index) => {
      html += `
        <div class="card shadow-sm mb-3">
          <div class="card-body">

            <div class="row align-items-center mb-2">
              <div class="col-4">
                <label class="form-label mb-0 fw-semibold">
                  Task ${index + 1}
                </label>
              </div>
              <div class="col-8">
                <input type="number"
                      class="form-control form-control-sm panel-task-input"
                      value="${t.value}"
                      data-row="${id}"
                      data-index="${index}">
              </div>
            </div>

            <div>
              <label class="form-label small text-muted fw-semibold">
                Comment
              </label>
              <textarea class="form-control form-control-sm"
                        rows="2"
                        data-row="${id}"
                        data-index="${index}"
                        placeholder="Write feedback here...">${tasksOriginal[index].comment || ""}</textarea>
            </div>

          </div>
        </div>
      `;
    });

    document.getElementById("panelTasks").innerHTML = html;

    document.querySelectorAll(".panel-task-input").forEach(input => {
      input.addEventListener("input", () => {
        const row = document.querySelector(`tr[data-id="${id}"]`);
        const index = input.dataset.index;
        row.querySelectorAll(".grade-input")[index].value = input.value;

        row.classList.add("row-dirty");
      });
    });
  }

  function closePanel() {
    const panel = document.getElementById("gradingPanel");
    panel.innerHTML = "";
    panel.classList.remove("active");
  }

  function saveCurrentFromPanel() {
    const id = document.getElementById("panelId").textContent;
    const dataNew = extractDataFromPanel(id);
    saveRow(id, dataNew, true);
  }

  function closeCurrentFromPanel() {
    const id = getIdFromPanel();
    extractDataFromPanel(id);
  }

  function resetCurrentFromPanel() {
    const id = getIdFromPanel();
    resetRow(id, true);
  }

  function getIdFromPanel() {
    return document.getElementById("panelId").textContent;
  }

  function saveCurrentFromTable(id) {
    const dataNew = extractDataFromRow(id);
    saveRow(id, dataNew);
  }

  function resetCurrentFromTable(id) {
    resetRow(id);
  }

  function extractDataFromRow(id) {
    const row = document.querySelector(`tr[data-id="${id}"]`);
    const data = [...row.querySelectorAll(".grade-input")].map(i => i.value);
    const tasks = [];
    data.forEach((score, index) => {
      tasks.push({
        index: index,
        score: parseFloat(score),
        commentTouched: false
      });
    });
    editedData.push({
      id: id,
      tasks: tasks
    });
    return tasks;
  }

  function extractDataFromPanel(id) {
    const tasks = [];
    const panel = document.getElementById("gradingPanel");
    panel.querySelectorAll(".panel-task-input").forEach(input => {
      const index = input.dataset.index;

      const textarea = panel.querySelector(
        `textarea[data-index="${index}"]`
      );

      tasks.push({
        index: index,
        score: parseFloat(input.value),
        comment: textarea.value.trim(),
        commentTouched: true
      });
    });
    editedData.push({
      id: id,
      tasks: tasks
    });
    return tasks;
  }
</script>
</body>
</html>
